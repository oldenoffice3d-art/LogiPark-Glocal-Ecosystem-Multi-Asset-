<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZVL | 3PL POV & GPS Simulation</title>
    
    <!-- LEAFLET.JS ДЛЯ ГЕОПРОСТОРОВОЇ СИМУЛЯЦІЇ -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');

        /* ВІЗУАЛЬНА ДНК СИСТЕМИ */
        :root {
            --deep-navy: #0A1128;
            --safety-orange: #FF9F1C;
            --grid-grey: #2B2D42;
            --data-white: #F2F2F2;
            --alert-red: #D90429;
            --proceed-green: #2A9D8F;
            --phone-case: #0f0f0f;
            --phone-bezel: #1a1a1a;
            --jit-gold: #FFD700;
        }

        * {
            box-sizing: border-box;
            border-radius: 0px !important;
            margin: 0; padding: 0;
            font-family: 'Roboto Mono', monospace;
            text-transform: uppercase;
        }

        body {
            background-color: var(--deep-navy);
            color: var(--data-white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                linear-gradient(var(--grid-grey) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-grey) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        header {
            background-color: var(--deep-navy);
            border-bottom: 2px solid var(--safety-orange);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
        }

        .logo { font-weight: 700; font-size: 1rem; letter-spacing: 2px; }
        .logo span { color: var(--safety-orange); }
        
        .header-controls { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
        .region-toggle { display: flex; gap: 5px; }

        .btn-region {
            background-color: transparent; color: #888; border: 1px solid #888;
            padding: 2px 8px; font-size: 0.6rem; cursor: pointer; font-weight: 700;
        }
        .btn-region.active { background-color: var(--safety-orange); color: var(--deep-navy); border-color: var(--safety-orange); }

        .main-nav {
            display: flex;
            background: rgba(10, 17, 40, 0.9);
            border-bottom: 1px solid var(--grid-grey);
            z-index: 1500;
        }
        .btn-nav {
            flex: 1; padding: 12px; background: transparent; border: none;
            color: var(--grid-grey); font-weight: 700; font-size: 0.7rem;
            cursor: pointer; border-bottom: 2px solid transparent;
        }
        .btn-nav.active {
            color: var(--safety-orange); border-bottom: 2px solid var(--safety-orange);
            background: rgba(255, 159, 28, 0.05);
        }

        .view-section { display: flex; flex: 1; overflow: hidden; width: 100%; position: relative; }
        .hidden-view { display: none !important; }

        .role-switcher {
            width: 50px; background: var(--grid-grey); display: flex;
            flex-direction: column; border-right: 1px solid var(--safety-orange);
            z-index: 1000;
        }
        .btn-role {
            flex: 1; writing-mode: vertical-rl; text-orientation: mixed;
            background: transparent; border: none; color: #888;
            font-size: 0.65rem; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-role.active { background: var(--safety-orange); color: var(--deep-navy); }

        /* POV SMARTPHONE FRAME */
        .phone-pov-container {
            flex: 1; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle, rgba(43, 45, 66, 0.5) 0%, rgba(10, 17, 40, 1) 100%);
            perspective: 1000px;
        }

        .phone-frame {
            width: 310px; height: 630px;
            background: var(--phone-case);
            border-radius: 50px !important;
            border: 10px solid #1a1a1a;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 10px rgba(255,255,255,0.1);
            display: flex; flex-direction: column;
            overflow: hidden; transform: rotateX(5deg);
        }

        .phone-island {
            width: 90px; height: 28px; background: #000;
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
            border-radius: 20px !important; z-index: 100;
        }

        .phone-screen {
            flex: 1; width: 100%; height: 100%;
            background: var(--deep-navy);
            display: flex; flex-direction: column;
            overflow: hidden; position: relative;
            border-radius: 35px !important;
        }

        .hw-status-bar {
            height: 44px; padding: 18px 25px 0;
            display: flex; justify-content: space-between;
            font-size: 0.6rem; color: #888; z-index: 60;
        }

        /* SCREEN CONTENT */
        .screen-content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; z-index: 40; }
        .driver-bg-stop { background-color: var(--alert-red) !important; color: white !important; }
        .driver-bg-go { background-color: var(--proceed-green) !important; color: white !important; }
        .huge-command { font-size: 3rem; font-weight: 900; margin-bottom: 5px; line-height: 1; }
        .sub-command { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }
        
        /* ETA ДЛЯ ВОДІЯ */
        .eta-display-driver { 
            font-size: 0.9rem; font-weight: 700; color: rgba(255,255,255,0.9); 
            margin-bottom: 30px; border: 1px solid white; padding: 8px 15px; background: rgba(0,0,0,0.1);
        }
        
        .btn-ack { background: rgba(0,0,0,0.2); border: 2px solid white; color: white; padding: 15px 35px; font-weight: 700; cursor: pointer; }

        /* ТЕРМІНАЛ АДМІНА */
        .admin-lists-container { display: flex; flex-direction: column; gap: 8px; padding: 10px; overflow-y: auto; flex: 1; width: 100%; }
        .list-section-title { font-size: 0.6rem; color: var(--safety-orange); border-bottom: 1px solid var(--grid-grey); padding-bottom: 2px; margin-bottom: 5px; font-weight: 700; }
        .admin-item { border: 1px solid var(--grid-grey); background: rgba(43, 45, 66, 0.3); padding: 8px; margin-bottom: 4px; display: flex; flex-direction: column; gap: 4px; cursor: pointer; }
        .admin-item.selected { border-color: var(--safety-orange); background: rgba(255, 159, 28, 0.1); }
        .admin-item.jit-swap-priority { border-left: 3px solid var(--jit-gold); }
        
        .eta-badge {
            font-size: 0.6rem; background: rgba(0,0,0,0.5); color: var(--safety-orange);
            padding: 2px 5px; border: 1px solid var(--safety-orange); float: right;
        }

        .active-asset-box { width: 100%; border: 1px solid var(--safety-orange); padding: 10px; margin-bottom: 8px; background: rgba(255, 159, 28, 0.05); position: relative; }
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
        .btn-cmd { padding: 12px 2px; font-size: 0.65rem; font-weight: 700; border: 1px solid; cursor: pointer; background: transparent; color: white; }
        .btn-stop-cmd { border-color: var(--alert-red); color: var(--alert-red); }
        .btn-go-cmd { border-color: var(--proceed-green); color: var(--proceed-green); }
        
        .btn-track-cmd { 
            border-color: var(--safety-orange); color: var(--safety-orange); 
            width: 100%; padding: 12px; margin-bottom: 8px; 
            font-size: 0.65rem; font-weight: 700; cursor: pointer; 
            background: rgba(255, 159, 28, 0.1); border: 1px solid;
        }

        .btn-shred-cmd { border: 1px dashed var(--safety-orange); color: var(--safety-orange); width: 100%; padding: 10px; font-size: 0.6rem; cursor: pointer; background: transparent; }

        .shred-confirm-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: #000; border: 2px solid var(--alert-red);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 110; padding: 15px; text-align: center; border-radius: 35px !important;
        }

        /* КАРТА ТА ТАБЛИЦІ */
        .dashboard-layout { width: 100%; height: 100%; display: flex; flex-direction: column; }
        .map-container { height: 50%; border-bottom: 2px solid var(--safety-orange); position: relative; width: 100%; z-index: 1; }
        #leaflet-map { width: 100%; height: 100%; background: var(--deep-navy); }
        .leaflet-layer { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
        
        .data-container { flex: 1; overflow-y: auto; padding: 10px; background: rgba(10, 17, 40, 0.9); }
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.55rem; }
        .data-table th, .data-table td { border: 1px solid var(--grid-grey); padding: 6px; text-align: left; }
        .data-table th { color: var(--safety-orange); background: rgba(43, 45, 66, 0.5); }

        .map-truck-icon { background-color: var(--alert-red); border: 1px solid #fff; width: 8px; height: 8px; border-radius: 50% !important; box-shadow: 0 0 5px var(--alert-red); }
        .map-truck-icon.green { background-color: var(--proceed-green); box-shadow: 0 0 5px var(--proceed-green); }
        .map-truck-icon.ghost { background-color: #888; border: 1px solid #444; width: 6px; height: 6px; opacity: 0.6; }

        .hidden { display: none !important; }
        .glitch { animation: glitch-anim 0.2s linear infinite; }
        @keyframes glitch-anim { 0% { transform: translate(0) } 20% { transform: translate(-1px, 1px) } 40% { transform: translate(-1px, -1px) } 100% { transform: translate(0) } }
    </style>
</head>
<body>

    <header>
        <div class="logo">ZVL<span>_</span>SYSTEM</div>
        <div class="header-controls">
            <div class="region-toggle">
                <button class="btn-region active" onclick="switchRegion('UK')" id="btn-uk">UK</button>
                <button class="btn-region" onclick="switchRegion('USA')" id="btn-usa">USA</button>
            </div>
            <div class="status-bar">PATENT PENDING</div>
        </div>
    </header>

    <nav class="main-nav">
        <button class="btn-nav active" onclick="switchMainView('operational')" id="nav-op">OPERATIONAL POV</button>
        <button class="btn-nav" onclick="switchMainView('global')" id="nav-gl">GLOBAL HUB MONITOR</button>
    </nav>

    <div id="section-operational" class="view-section">
        <aside class="role-switcher">
            <button class="btn-role active" onclick="switchRole('driver')" id="role-driver">DRIVER (BYOD)</button>
            <button class="btn-role" onclick="switchRole('admin')" id="role-admin">ADMIN (FOG)</button>
        </aside>

        <div class="phone-pov-container">
            <div class="phone-frame">
                <div class="phone-island"></div>
                <div class="phone-screen">
                    <div class="hw-status-bar">
                        <span id="hw-gnss">GNSS: ACTIVE</span>
                        <span id="hw-time">--:--</span>
                    </div>

                    <!-- ЕКРАН ВОДІЯ -->
                    <div id="driver-ui-frame" class="screen-content">
                        <div id="view-login">
                            <div style="font-size: 0.6rem; color: #888; margin-bottom: 10px;">SCAN TO LOGIN</div>
                            <div style="background: white; padding: 10px; margin-bottom: 15px; display: inline-block;">
                                <svg width="120" height="120" viewBox="0 0 24 24" fill="black"><path d="M3 3H9V9H3V3ZM5 5V7H7V5H5ZM15 3H21V9H15V3ZM17 5V7H19V5H17ZM3 15H9V21H3V15ZM5 17V19H7V17H5ZM15 15H17V17H15V15ZM19 15H21V17H19V15ZM17 17H19V19H17V17ZM15 19H17V21H15V19ZM19 19H21V21H19V19ZM11 3H13V5H11V3ZM11 7H13V9H11V7ZM11 11H13V13H11V11ZM3 11H5V13H3V11ZM7 11H9V13H7V11ZM15 11H17V13H15V11ZM19 11H21V13H19V11ZM11 15H13V17H11V15ZM11 19H13V21H11V19ZM13 13H15V15H13V13ZM13 17H15V19H13V17ZM17 13H19V15H17V13ZM21 13H22V15H21V13ZM15 21H17V22H15V21Z"/></svg>
                            </div>
                            <div id="driver-qr-val" style="font-size: 2rem; font-weight: 700; color: var(--safety-orange); letter-spacing: 3px;">8A9B2C</div>
                            <div style="font-size: 0.5rem; color: #555;">[ZERO-PII AUTH]</div>
                        </div>

                        <div id="view-stop" class="hidden" style="width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                            <div class="huge-command" id="txt-stop-cmd">STOP!</div>
                            <div class="sub-command" id="txt-stop-sub">FIND PARKING</div>
                            <button class="btn-ack" id="btn-ack-stop" onclick="ackDriver('STOP')">ACKNOWLEDGE</button>
                        </div>

                        <div id="view-go" class="hidden" style="width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                            <div class="huge-command" id="txt-go-cmd">GO!</div>
                            <div class="sub-command" id="txt-go-sub">PLACE FREE</div>
                            <div class="eta-display-driver" id="driver-eta-countdown">ETA TO DOCK: --:--</div>
                            <button class="btn-ack" id="btn-ack-go" onclick="ackDriver('GO')">ACKNOWLEDGE</button>
                        </div>

                        <div id="view-shredded" class="hidden" style="width: 100%; height: 100%; background: black !important; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                            <div class="text-huge glitch" style="font-size: 4rem;">∅</div>
                            <div class="text-sub glitch">SESSION SHREDDED</div>
                        </div>
                    </div>

                    <!-- ТЕРМІНАЛ АДМІНА -->
                    <div id="admin-ui-frame" class="hidden" style="height: 100%; display: flex; flex-direction: column;">
                        <div class="panel-header" style="background: #222; border:none;"><span>TERMINAL (GPS)</span><span>HUB_A</span></div>
                        <div class="admin-lists-container">
                            <div id="fog-active-box" class="active-asset-box hidden">
                                <div id="shred-confirm" class="shred-confirm-overlay hidden">
                                    <div style="font-size: 0.65rem; color: var(--alert-red); font-weight: 700; margin-bottom: 5px;">SHRED SESSION <span id="confirm-id">--</span>?</div>
                                    <div style="display: flex; gap: 8px;">
                                        <button onclick="cancelShred()" style="flex: 1; font-size: 0.5rem; border: 1px solid white; background:transparent; color:white;">CANCEL</button>
                                        <button onclick="executeShred()" style="flex: 1; font-size: 0.5rem; background: var(--alert-red); border: none; color:white;">SHRED</button>
                                    </div>
                                </div>
                                <div style="font-size: 0.8rem; font-weight: 700; margin-bottom: 5px;">TRUCK: <span id="adm-active-token">--</span></div>
                                <button class="btn-track-cmd" id="btn-active-gps" onclick="switchMainView('global')">
                                    TRACK LIVE GPS: <span id="adm-active-eta-val">--:--</span>
                                </button>
                                <div class="control-grid">
                                    <button class="btn-cmd btn-stop-cmd" onclick="adminSetState('BOUND')">STOP (RED)</button>
                                    <button class="btn-cmd btn-go-cmd" onclick="adminSetState('CALLED')">GO (GRN)</button>
                                </div>
                                <button class="btn-shred-cmd" onclick="requestShred()">COMPLETE TASK</button>
                            </div>
                            <div class="list-section-title">ACTIVE SESSIONS</div><div id="admin-active-list"></div>
                            <div class="list-section-title">PENDING QUEUE (GPS)</div><div id="admin-pending-list"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ГЛОБАЛЬНИЙ МОНІТОР -->
    <div id="section-global" class="view-section hidden-view">
        <div class="dashboard-layout">
            <div class="map-container"><div id="leaflet-map"></div></div>
            <div class="data-container">
                <div style="font-size: 0.7rem; font-weight: 700; color: var(--safety-orange); margin-bottom: 8px;">LIVE FLEET MONITOR</div>
                <table class="data-table">
                    <thead><tr><th>ID</th><th>ETA</th><th>STATUS</th></tr></thead>
                    <tbody id="cloud-table-body"></tbody>
                </table>
                <div style="font-size: 0.7rem; font-weight: 700; color: #888; margin: 15px 0 8px; border-top: 1px solid var(--grid-grey); padding-top: 10px;">COMPLETED ARCHIVE</div>
                <table class="data-table" style="opacity: 0.6;">
                    <thead><tr><th>ID</th><th>DATE</th><th>FINISH</th></tr></thead>
                    <tbody id="archive-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ІНІЦІАЛІЗАЦІЯ ДАНИХ (БЕЗ ПОМИЛОК ДОСТУПУ)
        const dict = {
            'UK': { hub: 'HUB_ALPHA', coords: [51.46, 0.25], startCoords: [51.58, 0.05], bufferRadius: 25000 },
            'USA': { hub: 'HUB_BETA', coords: [40.54, -74.18], startCoords: [40.75, -74.35], bufferRadius: 40233 }
        };

        let currentRegion = 'UK';
        const generateID = () => Math.random().toString(36).substring(2, 8).toUpperCase();
        
        function createNewTruck() {
            const d = dict[currentRegion];
            return { 
                id: generateID(), status: 'PENDING', 
                lat: d.startCoords[0] + (Math.random()-0.5)*0.05, 
                lng: d.startCoords[1] + (Math.random()-0.5)*0.05, 
                acknowledged: false, finishTime: null, finishDate: null, eta: '--',
                jitPriority: Math.random() > 0.8
            };
        }

        let fleetData = [];
        for(let i=0; i<15; i++) fleetData.push(createNewTruck());

        let ghostFleet = [];
        for(let i=0; i<8; i++) {
            ghostFleet.push({ id: 'GH-'+(100+i), offset: [(Math.random()-0.5)*0.1, (Math.random()-0.5)*0.1] });
        }

        let activeAdminAsset = null;
        let driverDemoAsset = fleetData[0].id;
        let map, hubMarker, bufferCircle;
        let mapMarkers = {}; 
        let ghostMarkers = {};

        // РОЛЬОВИЙ ТА ГОЛОВНИЙ ПЕРЕМИКАЧІ
        function switchRole(role) {
            document.getElementById('role-driver').classList.remove('active');
            document.getElementById('role-admin').classList.remove('active');
            document.getElementById('driver-ui-frame').classList.add('hidden');
            document.getElementById('admin-ui-frame').classList.add('hidden');
            if(role === 'driver') {
                document.getElementById('role-driver').classList.add('active');
                document.getElementById('driver-ui-frame').classList.remove('hidden');
            } else {
                document.getElementById('role-admin').classList.add('active');
                document.getElementById('admin-ui-frame').classList.remove('hidden');
            }
        }

        function switchMainView(view) {
            document.getElementById('nav-op').classList.remove('active');
            document.getElementById('nav-gl').classList.remove('active');
            document.getElementById('section-operational').classList.add('hidden-view');
            document.getElementById('section-global').classList.add('hidden-view');
            if(view === 'operational') {
                document.getElementById('nav-op').classList.add('active');
                document.getElementById('section-operational').classList.remove('hidden-view');
            } else {
                document.getElementById('nav-gl').classList.add('active');
                document.getElementById('section-global').classList.remove('hidden-view');
                setTimeout(() => { if(map) map.invalidateSize(); }, 200);
            }
        }

        // GPS ETA МАТЕМАТИКА
        function calculateETA(truck) {
            const d = dict[currentRegion];
            const dist = Math.sqrt(Math.pow(truck.lat - d.coords[0], 2) + Math.pow(truck.lng - d.coords[1], 2)) * 111;
            const minutes = Math.floor(dist * 1.5);
            const seconds = Math.floor((dist * 1.5 * 60) % 60);
            return minutes > 0 ? `${minutes}m ${seconds}s` : `${seconds}s`;
        }

        // РЕНДЕР ІНТЕРФЕЙСУ
        function renderUI() {
            const activeList = document.getElementById('admin-active-list');
            const pendingList = document.getElementById('admin-pending-list');
            const cloudTable = document.getElementById('cloud-table-body');
            const archiveTable = document.getElementById('archive-table-body');
            
            if (!activeList || !pendingList) return;
            activeList.innerHTML = ''; pendingList.innerHTML = ''; cloudTable.innerHTML = ''; archiveTable.innerHTML = '';

            fleetData.forEach(truck => {
                if(truck.status === 'SHREDDED') {
                    const row = document.createElement('tr');
                    row.innerHTML = `<td>${truck.id}</td><td>${truck.finishDate}</td><td>${truck.finishTime}</td>`;
                    archiveTable.appendChild(row);
                    return;
                }
                truck.eta = calculateETA(truck);
                const isSelected = truck.id === activeAdminAsset;

                if (truck.status === 'BOUND' || truck.status === 'CALLED') {
                    const item = document.createElement('div');
                    item.className = `admin-item ${isSelected ? 'selected' : ''}`;
                    item.onclick = () => focusToken(truck.id);
                    item.innerHTML = `<div style="display:flex; justify-content:space-between; font-size:0.6rem;"><span>${truck.id}</span><span style="color:${truck.status === 'CALLED' ? 'var(--proceed-green)' : 'var(--alert-red)'}">ETA: ${truck.eta}</span></div>`;
                    activeList.appendChild(item);
                } else {
                    const item = document.createElement('div');
                    item.className = `admin-item ${isSelected ? 'selected' : ''}`;
                    item.onclick = () => focusToken(truck.id);
                    item.innerHTML = `<div style="font-size:0.55rem;">${truck.id} <span class="eta-badge">GPS: ${truck.eta}</span></div>`;
                    pendingList.appendChild(item);
                }
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${truck.id}</td><td>${truck.eta}</td><td>${truck.status}</td>`;
                cloudTable.appendChild(tr);
            });

            if(activeAdminAsset) {
                const data = fleetData.find(t => t.id === activeAdminAsset);
                document.getElementById('fog-active-box').classList.remove('hidden');
                document.getElementById('adm-active-token').innerText = data.id;
                document.getElementById('adm-active-eta-val').innerText = data.eta;
            } else {
                document.getElementById('fog-active-box').classList.add('hidden');
            }
            renderDriverUI();
        }

        function focusToken(id) {
            activeAdminAsset = id; driverDemoAsset = id;
            const truck = fleetData.find(t => t.id === id);
            if(truck.status === 'PENDING') { createMapMarker(truck); truck.status = 'BOUND'; }
            document.getElementById('shred-confirm').classList.add('hidden');
            renderUI();
        }

        function adminSetState(state) {
            if(!activeAdminAsset) return;
            const truck = fleetData.find(t => t.id === activeAdminAsset);
            truck.status = state; truck.acknowledged = false;
            if(mapMarkers[truck.id]) mapMarkers[truck.id].setIcon(L.divIcon({ className: `map-truck-icon ${state === 'CALLED' ? 'green' : ''}`, iconSize: [8, 8] }));
            renderUI();
        }

        function requestShred() { if(!activeAdminAsset) return; document.getElementById('confirm-id').innerText = activeAdminAsset; document.getElementById('shred-confirm').classList.remove('hidden'); }
        function cancelShred() { document.getElementById('shred-confirm').classList.add('hidden'); }

        function executeShred() {
            const truck = fleetData.find(t => t.id === activeAdminAsset);
            truck.finishTime = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
            truck.finishDate = new Date().toLocaleDateString('en-GB');
            truck.status = 'SHREDDED';
            if(mapMarkers[truck.id]) { mapMarkers[truck.id].setIcon(L.divIcon({ className: 'map-truck-icon glitch', iconSize: [8, 8] })); setTimeout(() => { if(mapMarkers[truck.id]) { map.removeLayer(mapMarkers[truck.id]); delete mapMarkers[truck.id]; } }, 500); }
            document.getElementById('shred-confirm').classList.add('hidden');
            activeAdminAsset = null; renderUI();
            if (fleetData.filter(t => t.status === 'PENDING').length < 5) { for(let i=0; i<30; i++) fleetData.push(createNewTruck()); }
        }

        function renderDriverUI() {
            const frame = document.querySelector('.phone-screen');
            const vLogin = document.getElementById('view-login'), vStop = document.getElementById('view-stop'), vGo = document.getElementById('view-go'), vShred = document.getElementById('view-shredded');
            if(!vLogin) return; [vLogin, vStop, vGo, vShred].forEach(v => v.classList.add('hidden'));
            frame.className = 'phone-screen';
            const truck = fleetData.find(t => t.id === driverDemoAsset);
            if(!truck) return; document.getElementById('driver-qr-val').innerText = driverDemoAsset;
            if(truck.status === 'PENDING') vLogin.classList.remove('hidden');
            else if (truck.status === 'BOUND') {
                vStop.classList.remove('hidden'); frame.classList.add('driver-bg-stop');
                if(truck.acknowledged) { document.getElementById('txt-stop-cmd').innerText = "PARKING"; document.getElementById('txt-stop-sub').innerText = "STAY IN VEHICLE"; document.getElementById('btn-ack-stop').classList.add('hidden'); }
                else { document.getElementById('txt-stop-cmd').innerText = "STOP!"; document.getElementById('txt-stop-sub').innerText = "FIND PARKING"; document.getElementById('btn-ack-stop').classList.remove('hidden'); }
            } else if (truck.status === 'CALLED') {
                vGo.classList.remove('hidden'); frame.classList.add('driver-bg-go');
                document.getElementById('driver-eta-countdown').innerText = `ETA TO DOCK: ${truck.eta}`;
                if(truck.acknowledged) { document.getElementById('txt-go-cmd').innerText = "DOCK #1"; document.getElementById('txt-go-sub').innerText = "PROCEED NOW"; document.getElementById('btn-ack-go').classList.add('hidden'); }
                else { document.getElementById('txt-go-cmd').innerText = "GO!"; document.getElementById('txt-go-sub').innerText = "PLACE FREE"; document.getElementById('btn-ack-go').classList.remove('hidden'); }
            } else if (truck.status === 'SHREDDED') vShred.classList.remove('hidden');
        }

        function ackDriver() { const truck = fleetData.find(t => t.id === driverDemoAsset); if(truck) { truck.acknowledged = true; renderUI(); } }

        function switchRegion(region) {
            currentRegion = region; document.querySelectorAll('.btn-region').forEach(b => b.classList.remove('active'));
            if(event) event.target.classList.add('active');
            const d = dict[region];
            if(map) map.setView(d.coords, 10);
            if(hubMarker) hubMarker.setLatLng(d.coords);
            if(bufferCircle) { bufferCircle.setLatLng(d.coords); bufferCircle.setRadius(d.bufferRadius); }
            Object.values(mapMarkers).forEach(m => map.removeLayer(m));
            mapMarkers = {}; fleetData = [];
            for(let i=0; i<50; i++) fleetData.push(createNewTruck()); renderUI();
        }

        function initMap() {
            const d = dict[currentRegion];
            map = L.map('leaflet-map', { zoomControl: false, attributionControl: false }).setView(d.coords, 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            hubMarker = L.marker(d.coords, { icon: L.divIcon({ className: 'map-hub-icon', html: 'H', iconSize: [16, 16] }) }).addTo(map);
            bufferCircle = L.circle(d.coords, { color: '#FF9F1C', fillColor: '#FF9F1C', fillOpacity: 0.05, weight: 1, dashArray: '5, 5', radius: d.bufferRadius }).addTo(map);
            ghostFleet.forEach(ghost => {
                const lat = d.coords[0] + ghost.offset[0]; const lng = d.coords[1] + ghost.offset[1];
                ghostMarkers[ghost.id] = L.marker([lat, lng], { icon: L.divIcon({ className: 'map-truck-icon ghost', iconSize: [6, 6] }) }).addTo(map);
            });
        }

        function createMapMarker(truck) { mapMarkers[truck.id] = L.marker([truck.lat, truck.lng], { icon: L.divIcon({ className: `map-truck-icon`, iconSize: [8, 8] }) }).addTo(map); }

        function simulationTick() {
            const d = dict[currentRegion];
            fleetData.forEach(truck => {
                if (truck.status === 'BOUND') { truck.lat += (Math.random()-0.5)*0.0002; truck.lng += (Math.random()-0.5)*0.0002; }
                else if (truck.status === 'CALLED') { truck.lat += (d.coords[0]-truck.lat)*0.03; truck.lng += (d.coords[1]-truck.lng)*0.03; }
                if(mapMarkers[truck.id]) mapMarkers[truck.id].setLatLng([truck.lat, truck.lng]);
            });
            const timeEl = document.getElementById('hw-time');
            if(timeEl) timeEl.innerText = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
            renderUI();
        }

        window.onload = () => { initMap(); renderUI(); setInterval(simulationTick, 1000); };
    </script>
</body>
</html>
