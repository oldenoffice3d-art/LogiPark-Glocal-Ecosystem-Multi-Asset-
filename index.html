<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZVL | 3PL POV Simulation</title>
    
    <!-- LEAFLET.JS ДЛЯ ГЕОПРОСТОРОВОЇ СИМУЛЯЦІЇ -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');

        /* ВІЗУАЛЬНА ДНК СИСТЕМИ */
        :root {
            --deep-navy: #0A1128;
            --safety-orange: #FF9F1C;
            --grid-grey: #2B2D42;
            --data-white: #F2F2F2;
            --alert-red: #D90429;
            --proceed-green: #2A9D8F;
            --phone-bezel: #1a1a1a;
        }

        * {
            box-sizing: border-box;
            border-radius: 0px !important;
            margin: 0;
            padding: 0;
            font-family: 'Roboto Mono', monospace;
            text-transform: uppercase;
        }

        body {
            background-color: var(--deep-navy);
            color: var(--data-white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                linear-gradient(var(--grid-grey) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-grey) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
        }

        /* ШАПКА */
        header {
            background-color: var(--deep-navy);
            border-bottom: 2px solid var(--safety-orange);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
        }

        .logo { font-weight: 700; font-size: 1rem; letter-spacing: 2px; color: var(--data-white); }
        .logo span { color: var(--safety-orange); }
        
        .header-controls { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
        .region-toggle { display: flex; gap: 5px; }

        .btn-region {
            background-color: transparent; color: #888; border: 1px solid #888;
            padding: 2px 8px; font-size: 0.6rem; cursor: pointer; font-weight: 700;
        }
        .btn-region.active { background-color: var(--safety-orange); color: var(--deep-navy); border-color: var(--safety-orange); }

        .status-bar { font-size: 0.6rem; color: var(--safety-orange); }

        /* НАВІГАЦІЯ */
        .main-nav {
            display: flex;
            background: rgba(10, 17, 40, 0.9);
            border-bottom: 1px solid var(--grid-grey);
            z-index: 1500;
        }
        .btn-nav {
            flex: 1; padding: 12px; background: transparent; border: none;
            color: var(--grid-grey); font-weight: 700; font-size: 0.7rem;
            cursor: pointer; border-bottom: 2px solid transparent;
        }
        .btn-nav.active {
            color: var(--safety-orange); border-bottom: 2px solid var(--safety-orange);
            background: rgba(255, 159, 28, 0.05);
        }

        /* КОНТЕНТ */
        .view-section { display: flex; flex: 1; overflow: hidden; width: 100%; position: relative; }
        .hidden-view { display: none !important; }

        /* РОЛЬОВИЙ ПЕРЕМИКАЧ (POV) */
        .role-switcher {
            width: 60px; background: var(--grid-grey); display: flex;
            flex-direction: column; border-right: 1px solid var(--safety-orange);
            z-index: 1000;
        }
        .btn-role {
            flex: 1; writing-mode: vertical-rl; text-orientation: mixed;
            background: transparent; border: none; color: #888;
            font-size: 0.65rem; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-role.active { background: var(--safety-orange); color: var(--deep-navy); }

        /* POV SMARTPHONE FRAME */
        .phone-pov-container {
            flex: 1; display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.4); overflow: hidden;
        }

        .phone-frame {
            width: 320px;
            height: 640px;
            background: var(--phone-bezel);
            border-radius: 40px !important;
            border: 8px solid #333;
            position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8), inset 0 0 10px #000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Notch / Dynamic Island effect */
        .phone-notch {
            width: 120px; height: 25px; background: #000;
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            border-bottom-left-radius: 15px !important; border-bottom-right-radius: 15px !important;
            z-index: 20;
        }

        .phone-screen {
            flex: 1; width: 100%; height: 100%;
            background: var(--deep-navy);
            display: flex; flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .hw-status-bar {
            height: 40px; padding: 15px 25px 0;
            display: flex; justify-content: space-between;
            font-size: 0.6rem; color: #888; z-index: 10;
        }

        .screen-content {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 20px; text-align: center;
            transition: background-color 0.3s;
        }

        /* КОЛЬОРИ ВОДІЯ */
        .driver-bg-stop { background-color: var(--alert-red) !important; color: white !important; }
        .driver-bg-go { background-color: var(--proceed-green) !important; color: white !important; }
        
        .huge-command { font-size: 2.8rem; font-weight: 900; margin-bottom: 5px; line-height: 1; }
        .sub-command { font-size: 1rem; font-weight: 700; margin-bottom: 30px; }
        .btn-ack { background: rgba(0,0,0,0.2); border: 2px solid white; color: white; padding: 12px 30px; font-size: 0.9rem; font-weight: 700; cursor: pointer; }

        /* ЕКРАН АДМІНА У ТЕЛЕФОНІ */
        .admin-lists-container { display: flex; flex-direction: column; gap: 8px; padding: 10px; overflow-y: auto; flex: 1; text-align: left; width: 100%; }
        .list-section-title { font-size: 0.6rem; color: var(--safety-orange); border-bottom: 1px solid var(--grid-grey); padding-bottom: 2px; margin-bottom: 5px; font-weight: 700; }
        .admin-item { border: 1px solid var(--grid-grey); background: rgba(43, 45, 66, 0.3); padding: 8px; margin-bottom: 4px; display: flex; flex-direction: column; gap: 4px; cursor: pointer; }
        .admin-item.selected { border-color: var(--safety-orange); background: rgba(255, 159, 28, 0.1); }
        
        .active-asset-box { width: 100%; border: 1px solid var(--safety-orange); padding: 10px; margin-bottom: 8px; background: rgba(255, 159, 28, 0.05); text-align: left; position: relative; }
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
        .btn-cmd { padding: 10px 2px; font-size: 0.6rem; font-weight: 700; border: 1px solid; cursor: pointer; background: transparent; color: white; }
        .btn-stop-cmd { border-color: var(--alert-red); color: var(--alert-red); }
        .btn-go-cmd { border-color: var(--proceed-green); color: var(--proceed-green); }
        .btn-shred-cmd { border: 1px dashed var(--safety-orange); color: var(--safety-orange); width: 100%; padding: 8px; font-size: 0.6rem; }

        /* SHRED OVERLAY */
        .shred-confirm-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--deep-navy); border: 2px solid var(--alert-red);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; padding: 15px; text-align: center;
        }

        /* GLOBAL HUB VIEW (50/50) */
        .dashboard-layout { width: 100%; height: 100%; display: flex; flex-direction: column; }
        .map-container { height: 50%; border-bottom: 2px solid var(--safety-orange); position: relative; width: 100%; flex-shrink: 0; z-index: 1; }
        #leaflet-map { width: 100%; height: 100%; background: var(--deep-navy); }
        .leaflet-layer { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
        .data-container { flex: 1; overflow-y: auto; padding: 10px; background: rgba(10, 17, 40, 0.9); }
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.6rem; }
        .data-table th, .data-table td { border: 1px solid var(--grid-grey); padding: 6px; text-align: left; }
        .data-table th { color: var(--safety-orange); background: rgba(43, 45, 66, 0.5); position: sticky; top: 0; }

        /* ICONS */
        .map-truck-icon { background-color: var(--alert-red); border: 1px solid #fff; width: 8px; height: 8px; border-radius: 50% !important; box-shadow: 0 0 5px var(--alert-red); }
        .map-truck-icon.green { background-color: var(--proceed-green); box-shadow: 0 0 5px var(--proceed-green); }
        .map-truck-icon.ghost { background-color: #888; border: 1px solid #444; width: 6px; height: 6px; opacity: 0.6; }

        .qr-placeholder { background: white; padding: 10px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; }
        .digital-token-display { font-size: 2rem; font-weight: 700; color: var(--safety-orange); letter-spacing: 3px; margin-bottom: 5px; }

        .hidden { display: none !important; }
        .glitch { animation: glitch-anim 0.2s linear infinite; }
        @keyframes glitch-anim { 0% { transform: translate(0) } 20% { transform: translate(-1px, 1px) } 40% { transform: translate(-1px, -1px) } 100% { transform: translate(0) } }

        /* Оптимізація для маленьких екранів */
        @media (max-width: 400px) {
            .phone-frame { width: 100%; height: 100%; border-radius: 0 !important; border: none; }
            .phone-notch { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">ZVL<span>_</span>SYSTEM</div>
        <div class="header-controls">
            <div class="region-toggle">
                <button class="btn-region active" onclick="switchRegion('UK')" id="btn-uk">UK</button>
                <button class="btn-region" onclick="switchRegion('USA')" id="btn-usa">USA</button>
            </div>
            <div class="status-bar">PATENT PENDING</div>
        </div>
    </header>

    <nav class="main-nav">
        <button class="btn-nav active" onclick="switchMainView('operational')" id="nav-op">OPERATIONAL POV</button>
        <button class="btn-nav" onclick="switchMainView('global')" id="nav-gl">GLOBAL MONITOR</button>
    </nav>

    <div id="section-operational" class="view-section">
        <!-- БІЧНИЙ ПЕРЕМИКАЧ (РОЛІ) -->
        <aside class="role-switcher">
            <button class="btn-role active" onclick="switchRole('driver')" id="role-driver">DRIVER (BYOD)</button>
            <button class="btn-role" onclick="switchRole('admin')" id="role-admin">ADMIN (FOG)</button>
        </aside>

        <!-- POV SMARTPHONE AREA -->
        <div class="phone-pov-container">
            <div class="phone-frame">
                <div class="phone-notch"></div>
                <div class="phone-screen">
                    <div class="hw-status-bar">
                        <span id="hw-gnss">GNSS: IDLE</span>
                        <span id="hw-time">14:20</span>
                    </div>

                    <!-- DRIVER INTERFACE -->
                    <div id="driver-ui-frame" class="driver-container" style="height: 100%; display: flex; flex-direction: column;">
                        <!-- Login View -->
                        <div id="view-login" class="screen-content">
                            <div style="font-size: 0.6rem; color: #888; margin-bottom: 10px;">SHOW TO TERMINAL</div>
                            <div class="qr-placeholder">
                                <svg width="120" height="120" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 3H9V9H3V3ZM5 5V7H7V5H5ZM15 3H21V9H15V3ZM17 5V7H19V5H17ZM3 15H9V21H3V15ZM5 17V19H7V17H5ZM15 15H17V17H15V15ZM19 15H21V17H19V15ZM17 17H19V19H17V17ZM15 19H17V21H15V19ZM19 19H21V21H19V19ZM11 3H13V5H11V3ZM11 7H13V9H11V7ZM11 11H13V13H11V11ZM3 11H5V13H3V11ZM7 11H9V13H7V11ZM15 11H17V13H15V11ZM19 11H21V13H19V11ZM11 15H13V17H11V15ZM11 19H13V21H11V19ZM13 13H15V15H13V13ZM13 17H15V19H13V17ZM17 13H19V15H17V13ZM21 13H22V15H21V13ZM15 21H17V22H15V21Z" fill="black"/></svg>
                            </div>
                            <div class="digital-token-display" id="driver-qr-val">8A9B2C</div>
                            <div style="font-size: 0.5rem; color: #555;">[SECURE BINDING]</div>
                        </div>

                        <!-- STOP VIEW (RED) -->
                        <div id="view-stop" class="screen-content hidden driver-bg-stop">
                            <div class="huge-command" id="txt-stop-cmd">STOP!</div>
                            <div class="sub-command" id="txt-stop-sub">FIND PARKING</div>
                            <button class="btn-ack" id="btn-ack-stop" onclick="ackDriver('STOP')">ACKNOWLEDGE</button>
                        </div>

                        <!-- GO VIEW (GREEN) -->
                        <div id="view-go" class="screen-content hidden driver-bg-go">
                            <div class="huge-command" id="txt-go-cmd">GO!</div>
                            <div class="sub-command" id="txt-go-sub">PLACE FREE</div>
                            <button class="btn-ack" id="btn-ack-go" onclick="ackDriver('GO')">ACKNOWLEDGE</button>
                        </div>

                        <!-- SHREDDED -->
                        <div id="view-shredded" class="screen-content hidden" style="background: black !important;">
                            <div class="text-huge glitch" style="font-size: 4rem;">∅</div>
                            <div class="text-sub glitch">SESSION SHREDDED</div>
                        </div>
                    </div>

                    <!-- ADMIN INTERFACE (INSIDE PHONE FOR DEMO) -->
                    <div id="admin-ui-frame" class="hidden" style="height: 100%; display: flex; flex-direction: column;">
                        <div class="panel-header" style="background: #222;"><span>TERMINAL</span><span>HUB_A</span></div>
                        <div class="admin-lists-container">
                            <div id="fog-no-active" class="active-asset-box" style="text-align: center; border-style: dashed; color: #888; font-size: 0.6rem;">[ SELECT FROM QUEUE ]</div>
                            
                            <div id="fog-active-box" class="active-asset-box hidden">
                                <!-- Confirm Shred -->
                                <div id="shred-confirm" class="shred-confirm-overlay hidden">
                                    <div style="font-size: 0.65rem; color: var(--alert-red); font-weight: 700;">CAUTION</div>
                                    <div style="font-size: 0.55rem; color: white; margin-bottom: 10px;">SHRED SESSION FOR <span id="confirm-id">--</span>?</div>
                                    <div style="display: flex; gap: 5px;">
                                        <button onclick="cancelShred()" style="flex: 1; font-size: 0.5rem; border: 1px solid white;">CANCEL</button>
                                        <button onclick="executeShred()" style="flex: 1; font-size: 0.5rem; background: var(--alert-red); border: none;">CONFIRM</button>
                                    </div>
                                </div>

                                <div style="font-size: 0.8rem; font-weight: 700; margin-bottom: 5px;">TRUCK: <span id="adm-active-token">--</span></div>
                                <div class="control-grid">
                                    <button class="btn-cmd btn-stop-cmd" onclick="adminSetState('BOUND')">STOP (RED)</button>
                                    <button class="btn-cmd btn-go-cmd" onclick="adminSetState('CALLED')">GO (GRN)</button>
                                </div>
                                <button class="btn-shred-cmd" onclick="requestShred()">TASK COMPLETE</button>
                            </div>

                            <div class="list-section-title">ACTIVE</div><div id="admin-active-list"></div>
                            <div class="list-section-title">QUEUE</div><div id="admin-pending-list"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ГЛОБАЛЬНИЙ МОНІТОР -->
    <div id="section-global" class="view-section hidden-view">
        <div class="dashboard-layout">
            <div class="map-container"><div id="leaflet-map"></div></div>
            <div class="data-container">
                <div style="font-size: 0.7rem; font-weight: 700; color: var(--safety-orange); margin-bottom: 8px;">GLOBAL FLEET MATRIX</div>
                <table class="data-table">
                    <thead><tr><th>ID</th><th>TACHO</th><th>STATUS</th></tr></thead>
                    <tbody id="cloud-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const dict = {
            'UK': { hub: 'HUB_ALPHA', coords: [51.46, 0.25], startCoords: [51.58, 0.05] },
            'USA': { hub: 'HUB_BETA', coords: [40.54, -74.18], startCoords: [40.75, -74.35] }
        };

        // ТЕХНІЧНИЙ ФЛОТ (15 авто + автопоповнення)
        let fleetData = [];
        const generateID = () => Math.random().toString(36).substring(2, 8).toUpperCase();
        for(let i=0; i<15; i++) {
            fleetData.push({ id: generateID(), tacho: (Math.floor(Math.random()*8)+1)+'h '+(Math.floor(Math.random()*59))+'m', status: 'PENDING', lat: 0, lng: 0, acknowledged: false });
        }

        let ghostFleet = [];
        for(let i=0; i<10; i++) {
            ghostFleet.push({ id: 'GH-'+(100+i), offset: [(Math.random()-0.5)*0.1, (Math.random()-0.5)*0.1] });
        }

        let currentRegion = 'UK';
        let activeAdminAsset = null;
        let driverDemoAsset = fleetData[0].id;
        let map, hubMarker;
        let mapMarkers = {}; 
        let ghostMarkers = {};

        // АВТОПОПОВНЕННЯ (для 3PL пітчу)
        function autoReplenishQueue() {
            const pending = fleetData.filter(t => t.status === 'PENDING').length;
            if (pending < 5) {
                for(let i=0; i<50; i++) {
                    fleetData.push({ id: generateID(), tacho: (Math.floor(Math.random()*8)+1)+'h '+(Math.floor(Math.random()*59))+'m', status: 'PENDING', lat: 0, lng: 0, acknowledged: false });
                }
                renderUI();
            }
        }

        // SWITCH ROLE
        function switchRole(role) {
            document.getElementById('role-driver').classList.remove('active');
            document.getElementById('role-admin').classList.remove('active');
            document.getElementById('driver-ui-frame').classList.add('hidden');
            document.getElementById('admin-ui-frame').classList.add('hidden');

            if(role === 'driver') {
                document.getElementById('role-driver').classList.add('active');
                document.getElementById('driver-ui-frame').classList.remove('hidden');
            } else {
                document.getElementById('role-admin').classList.add('active');
                document.getElementById('admin-ui-frame').classList.remove('hidden');
            }
        }

        function switchMainView(view) {
            document.getElementById('nav-op').classList.remove('active');
            document.getElementById('nav-gl').classList.remove('active');
            document.getElementById('section-operational').classList.add('hidden-view');
            document.getElementById('section-global').classList.add('hidden-view');
            if(view === 'operational') {
                document.getElementById('nav-op').classList.add('active');
                document.getElementById('section-operational').classList.remove('hidden-view');
            } else {
                document.getElementById('nav-gl').classList.add('active');
                document.getElementById('section-global').classList.remove('hidden-view');
                setTimeout(() => map.invalidateSize(), 200);
            }
        }

        function renderUI() {
            const activeList = document.getElementById('admin-active-list');
            const pendingList = document.getElementById('admin-pending-list');
            const cloudTable = document.getElementById('cloud-table-body');
            activeList.innerHTML = ''; pendingList.innerHTML = ''; cloudTable.innerHTML = '';

            fleetData.forEach(truck => {
                if(truck.status === 'SHREDDED') return;
                const item = document.createElement('div');
                item.className = `admin-item ${truck.id === activeAdminAsset ? 'selected' : ''}`;
                
                if (truck.status === 'BOUND' || truck.status === 'CALLED') {
                    item.onclick = () => focusToken(truck.id);
                    item.innerHTML = `<div style="display:flex; justify-content:space-between; font-size:0.65rem;">
                        <span>${truck.id}</span><span style="color:${truck.status === 'CALLED' ? 'var(--proceed-green)' : 'var(--alert-red)'}">${truck.status === 'CALLED' ? 'GO' : 'STOP'}</span>
                    </div>`;
                    activeList.appendChild(item);
                } else if (truck.status === 'PENDING') {
                    item.onclick = () => focusToken(truck.id);
                    item.innerHTML = `<div style="font-size:0.65rem; color:#888;">${truck.id} (PENDING)</div>`;
                    pendingList.appendChild(item);
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${truck.id}</td><td>${truck.tacho}</td><td>${truck.status}</td>`;
                cloudTable.appendChild(tr);
            });

            if(activeAdminAsset) {
                const data = fleetData.find(t => t.id === activeAdminAsset);
                document.getElementById('fog-no-active').classList.add('hidden');
                document.getElementById('fog-active-box').classList.remove('hidden');
                document.getElementById('adm-active-token').innerText = data.id;
            } else {
                document.getElementById('fog-no-active').classList.remove('hidden');
                document.getElementById('fog-active-box').classList.add('hidden');
            }
            renderDriverUI();
        }

        function focusToken(id) {
            activeAdminAsset = id;
            driverDemoAsset = id;
            const truck = fleetData.find(t => t.id === id);
            if(truck.status === 'PENDING') {
                const d = dict[currentRegion];
                truck.lat = d.startCoords[0]; truck.lng = d.startCoords[1];
                createMapMarker(truck);
                truck.status = 'BOUND';
            }
            document.getElementById('shred-confirm').classList.add('hidden');
            renderUI();
        }

        function adminSetState(state) {
            if(!activeAdminAsset) return;
            const truck = fleetData.find(t => t.id === activeAdminAsset);
            truck.status = state;
            truck.acknowledged = false;
            if(mapMarkers[truck.id]) {
                mapMarkers[truck.id].setIcon(L.divIcon({ className: `map-truck-icon ${state === 'CALLED' ? 'green' : ''}`, iconSize: [8, 8] }));
            }
            renderUI();
        }

        function requestShred() {
            if(!activeAdminAsset) return;
            document.getElementById('confirm-id').innerText = activeAdminAsset;
            document.getElementById('shred-confirm').classList.remove('hidden');
        }

        function cancelShred() { document.getElementById('shred-confirm').classList.add('hidden'); }

        function executeShred() {
            if(!activeAdminAsset) return;
            const truck = fleetData.find(t => t.id === activeAdminAsset);
            truck.status = 'SHREDDED';
            if(mapMarkers[truck.id]) {
                mapMarkers[truck.id].setIcon(L.divIcon({ className: 'map-truck-icon glitch', iconSize: [8, 8] }));
                setTimeout(() => { if(mapMarkers[truck.id]) { map.removeLayer(mapMarkers[truck.id]); delete mapMarkers[truck.id]; } }, 500);
            }
            document.getElementById('shred-confirm').classList.add('hidden');
            activeAdminAsset = null;
            renderUI();
            autoReplenishQueue();
        }

        function renderDriverUI() {
            const views = ['view-login', 'view-stop', 'view-go', 'view-shredded'];
            views.forEach(v => document.getElementById(v).classList.add('hidden'));
            const screen = document.querySelector('.phone-screen');
            screen.className = 'phone-screen';

            const truck = fleetData.find(t => t.id === driverDemoAsset);
            document.getElementById('driver-qr-val').innerText = driverDemoAsset;

            if(!truck || truck.status === 'PENDING') {
                document.getElementById('view-login').classList.remove('hidden');
                document.getElementById('hw-gnss').innerText = "GNSS: IDLE";
            } else if (truck.status === 'BOUND') {
                document.getElementById('view-stop').classList.remove('hidden');
                screen.classList.add('driver-bg-stop');
                document.getElementById('hw-gnss').innerText = "GNSS: ACTIVE";
                if(truck.acknowledged) {
                    document.getElementById('txt-stop-cmd').innerText = "PARKING";
                    document.getElementById('txt-stop-sub').innerText = "STAY IN VEHICLE";
                    document.getElementById('btn-ack-stop').classList.add('hidden');
                } else {
                    document.getElementById('txt-stop-cmd').innerText = "STOP!";
                    document.getElementById('txt-stop-sub').innerText = "FIND PARKING";
                    document.getElementById('btn-ack-stop').classList.remove('hidden');
                }
            } else if (truck.status === 'CALLED') {
                document.getElementById('view-go').classList.remove('hidden');
                screen.classList.add('driver-bg-go');
                document.getElementById('hw-gnss').innerText = "GNSS: ACTIVE";
                if(truck.acknowledged) {
                    document.getElementById('txt-go-cmd').innerText = "DOCK #1";
                    document.getElementById('txt-go-sub').innerText = "PROCEED NOW";
                    document.getElementById('btn-ack-go').classList.add('hidden');
                } else {
                    document.getElementById('txt-go-cmd').innerText = "GO!";
                    document.getElementById('txt-go-sub').innerText = "PLACE FREE";
                    document.getElementById('btn-ack-go').classList.remove('hidden');
                }
            } else if (truck.status === 'SHREDDED') {
                document.getElementById('view-shredded').classList.remove('hidden');
                document.getElementById('hw-gnss').innerText = "GNSS: SLEEP";
                setTimeout(() => { driverDemoAsset = fleetData.find(t => t.status === 'PENDING')?.id || "DONE"; renderUI(); }, 3000);
            }
        }

        function ackDriver() {
            const truck = fleetData.find(t => t.id === driverDemoAsset);
            if(truck) { truck.acknowledged = true; renderUI(); }
        }

        function switchRegion(region) {
            currentRegion = region;
            document.getElementById('btn-uk').classList.remove('active');
            document.getElementById('btn-usa').classList.remove('active');
            document.getElementById(`btn-${region.toLowerCase()}`).classList.add('active');
            const d = dict[region];
            map.setView(d.coords, 10);
            hubMarker.setLatLng(d.coords);
            Object.values(mapMarkers).forEach(m => map.removeLayer(m));
            Object.values(ghostMarkers).forEach(m => map.removeLayer(m));
            mapMarkers = {}; ghostMarkers = {};
            fleetData.forEach(t => { t.status = 'PENDING'; t.acknowledged = false; });
            initGhostMarkers(); activeAdminAsset = null;
            renderUI();
        }

        function initMap() {
            const d = dict[currentRegion];
            map = L.map('leaflet-map', { zoomControl: false, attributionControl: false }).setView(d.coords, 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            hubMarker = L.marker(d.coords, { icon: L.divIcon({ className: 'map-hub-icon', html: 'H', iconSize: [16, 16] }) }).addTo(map);
            initGhostMarkers();
        }

        function initGhostMarkers() {
            const d = dict[currentRegion];
            ghostFleet.forEach(ghost => {
                const lat = d.coords[0] + ghost.offset[0];
                const lng = d.coords[1] + ghost.offset[1];
                ghostMarkers[ghost.id] = L.marker([lat, lng], { icon: L.divIcon({ className: 'map-truck-icon ghost', iconSize: [6, 6] }) }).addTo(map);
            });
        }

        function createMapMarker(truck) {
            mapMarkers[truck.id] = L.marker([truck.lat, truck.lng], { icon: L.divIcon({ className: `map-truck-icon`, iconSize: [8, 8] }) }).addTo(map);
        }

        function simulationTick() {
            const d = dict[currentRegion];
            fleetData.forEach(truck => {
                if (truck.status === 'BOUND') {
                    truck.lat += (Math.random() - 0.5) * 0.0005; truck.lng += (Math.random() - 0.5) * 0.0005;
                } else if (truck.status === 'CALLED') {
                    truck.lat += (d.coords[0] - truck.lat) * 0.05; truck.lng += (d.coords[1] - truck.lng) * 0.05;
                }
                if(mapMarkers[truck.id]) mapMarkers[truck.id].setLatLng([truck.lat, truck.lng]);
            });
            ghostFleet.forEach(ghost => {
                if(ghostMarkers[ghost.id]) {
                    const pos = ghostMarkers[ghost.id].getLatLng();
                    ghostMarkers[ghost.id].setLatLng([pos.lat + (Math.random() - 0.5) * 0.0002, pos.lng + (Math.random() - 0.5) * 0.0002]);
                }
            });
            // Update clock
            document.getElementById('hw-time').innerText = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        }

        window.onload = () => { initMap(); renderUI(); setInterval(simulationTick, 1000); };
    </script>
</body>
</html>
